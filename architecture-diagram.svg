<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <style>
      .box { fill: #E8F4F8; stroke: #0288D1; stroke-width: 2; }
      .box-frontend { fill: #C3E9FB; stroke: #0288D1; stroke-width: 2; }
      .box-backend { fill: #C8E6C9; stroke: #388E3C; stroke-width: 2; }
      .box-database { fill: #F8BBD0; stroke: #C2185B; stroke-width: 2; }
      .box-alb { fill: #FFE0B2; stroke: #F57C00; stroke-width: 2; }
      .box-cloudflare { fill: #F3E5F5; stroke: #7B1FA2; stroke-width: 2; }
      .text-label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .text-small { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .dashed-arrow { stroke: #666; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
      .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; text-anchor: middle; }
      .subtitle { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; fill: #666; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="30" class="title">Travel Memory MERN Application Architecture</text>
  <text x="600" y="50" class="subtitle">AWS EC2 Deployment with Load Balancer and Cloudflare</text>

  <!-- Layer 1: Client/Browser -->
  <rect x="450" y="70" width="300" height="60" class="box" rx="5"/>
  <text x="600" y="105" class="text-label">Browser / Client</text>
  <text x="600" y="120" class="text-small">(HTTPS Request)</text>

  <!-- Arrow down -->
  <line x1="600" y1="130" x2="600" y2="160" class="arrow"/>

  <!-- Layer 2: Cloudflare -->
  <rect x="350" y="160" width="500" height="100" class="box-cloudflare" rx="5"/>
  <text x="600" y="190" class="text-label">Cloudflare (DNS + SSL/TLS)</text>
  
  <!-- DNS Records -->
  <rect x="370" y="200" width="210" height="50" fill="none" stroke="#7B1FA2" stroke-width="1" stroke-dasharray="3,3" rx="3"/>
  <text x="475" y="220" class="text-small">shagunthetech.in</text>
  <text x="475" y="235" class="text-small">(A Record)</text>

  <rect x="620" y="200" width="210" height="50" fill="none" stroke="#7B1FA2" stroke-width="1" stroke-dasharray="3,3" rx="3"/>
  <text x="725" y="220" class="text-small">api.shagunthetech.in</text>
  <text x="725" y="235" class="text-small">(CNAME Record)</text>

  <!-- Arrow down to Frontend -->
  <line x1="475" y1="260" x2="300" y2="290" class="arrow"/>
  <text x="350" y="280" class="text-small">Frontend</text>

  <!-- Arrow down to ALB -->
  <line x1="725" y1="260" x2="750" y2="290" class="arrow"/>
  <text x="780" y="280" class="text-small">API</text>

  <!-- Layer 3: Frontend Server (TM-Master-Server) -->
  <rect x="150" y="290" width="300" height="120" class="box-frontend" rx="5"/>
  <text x="300" y="320" class="text-label">TM-Master-Server</text>
  <text x="300" y="340" class="text-small">(EC2 Instance)</text>
  
  <!-- Frontend Details -->
  <rect x="165" y="355" width="270" height="40" fill="white" stroke="#0288D1" stroke-width="1" rx="3"/>
  <text x="300" y="370" class="text-small">React.js Frontend</text>
  <text x="300" y="385" class="text-small">Nginx Web Server (Port 80)</text>

  <!-- Arrow down -->
  <line x1="300" y1="410" x2="300" y2="450" class="dashed-arrow"/>

  <!-- Layer 4: Application Load Balancer -->
  <rect x="600" y="290" width="300" height="120" class="box-alb" rx="5"/>
  <text x="750" y="320" class="text-label">Application Load Balancer</text>
  <text x="750" y="340" class="text-small">(ALB)</text>
  
  <!-- ALB Details -->
  <rect x="615" y="355" width="270" height="40" fill="white" stroke="#F57C00" stroke-width="1" rx="3"/>
  <text x="750" y="370" class="text-small">Port: 3000</text>
  <text x="750" y="385" class="text-small">Health Check: /api/health</text>

  <!-- Arrow down from ALB -->
  <line x1="750" y1="410" x2="750" y2="450" class="arrow"/>

  <!-- Layer 5: Backend Servers -->
  <!-- Backend-01 -->
  <rect x="550" y="450" width="280" height="150" class="box-backend" rx="5"/>
  <text x="690" y="480" class="text-label">travelMemory-backend-01</text>
  <text x="690" y="500" class="text-small">(EC2 Instance)</text>
  
  <!-- Backend-01 Details -->
  <rect x="565" y="520" width="250" height="70" fill="white" stroke="#388E3C" stroke-width="1" rx="3"/>
  <text x="690" y="535" class="text-small">Node.js + Express.js</text>
  <text x="690" y="550" class="text-small">PM2 Process Manager</text>
  <text x="690" y="565" class="text-small">Port: 3000</text>
  <text x="690" y="580" class="text-small">MongoDB Connection</text>

  <!-- Backend-02 -->
  <rect x="920" y="450" width="280" height="150" class="box-backend" rx="5"/>
  <text x="1060" y="480" class="text-label">travelMemory-backend-02</text>
  <text x="1060" y="500" class="text-small">(EC2 Instance)</text>
  
  <!-- Backend-02 Details -->
  <rect x="935" y="520" width="250" height="70" fill="white" stroke="#388E3C" stroke-width="1" rx="3"/>
  <text x="1060" y="535" class="text-small">Node.js + Express.js</text>
  <text x="1060" y="550" class="text-small">PM2 Process Manager</text>
  <text x="1060" y="565" class="text-small">Port: 3000</text>
  <text x="1060" y="580" class="text-small">MongoDB Connection</text>

  <!-- Arrows from ALB to Backends -->
  <line x1="710" y1="410" x2="690" y2="450" class="arrow"/>
  <line x1="790" y1="410" x2="1060" y2="450" class="arrow"/>
  <text x="680" y="435" class="text-small">Traffic</text>
  <text x="920" y="435" class="text-small">Distribution</text>

  <!-- Arrows from Backends to Database -->
  <line x1="690" y1="600" x2="600" y2="730" class="arrow"/>
  <line x1="1060" y1="600" x2="750" y2="730" class="arrow"/>

  <!-- Layer 6: Database -->
  <rect x="450" y="730" width="300" height="100" class="box-database" rx="5"/>
  <text x="600" y="760" class="text-label">MongoDB Atlas</text>
  <text x="600" y="780" class="text-small">(Cloud Database)</text>
  
  <!-- Database Details -->
  <rect x="465" y="790" width="270" height="30" fill="white" stroke="#C2185B" stroke-width="1" rx="3"/>
  <text x="600" y="810" class="text-small">travelmemory Database</text>

  <!-- Legend -->
  <g>
    <text x="50" y="850" class="text-label" style="text-anchor: start; font-size: 12px;">Legend:</text>
    
    <rect x="50" y="860" width="30" height="20" class="box-frontend"/>
    <text x="90" y="875" class="text-small" style="text-anchor: start;">Frontend Server</text>
    
    <rect x="280" y="860" width="30" height="20" class="box-backend"/>
    <text x="320" y="875" class="text-small" style="text-anchor: start;">Backend Servers</text>
    
    <rect x="550" y="860" width="30" height="20" class="box-alb"/>
    <text x="590" y="875" class="text-small" style="text-anchor: start;">Load Balancer</text>
    
    <rect x="800" y="860" width="30" height="20" class="box-database"/>
    <text x="840" y="875" class="text-small" style="text-anchor: start;">Database</text>
    
    <rect x="1050" y="860" width="30" height="20" class="box-cloudflare"/>
    <text x="1090" y="875" class="text-small" style="text-anchor: start;">Cloudflare</text>
  </g>

  <!-- Additional Info Box -->
  <rect x="50" y="640" width="350" height="180" fill="#FAFAFA" stroke="#999" stroke-width="1" rx="5"/>
  <text x="225" y="665" class="text-label" style="font-size: 13px;">Deployment Details</text>
  
  <text x="65" y="685" class="text-small" style="text-anchor: start; font-size: 11px;">Check HTTPS enabled via Cloudflare</text>
  <text x="65" y="700" class="text-small" style="text-anchor: start; font-size: 11px;">Check Load balancing across 2 backends</text>
  <text x="65" y="715" class="text-small" style="text-anchor: start; font-size: 11px;">Check Health checks configured</text>
  <text x="65" y="730" class="text-small" style="text-anchor: start; font-size: 11px;">Check Auto-restart with PM2</text>
  <text x="65" y="745" class="text-small" style="text-anchor: start; font-size: 11px;">Check MongoDB Atlas for data</text>
  <text x="65" y="760" class="text-small" style="text-anchor: start; font-size: 11px;">Check Nginx for static content</text>
  <text x="65" y="775" class="text-small" style="text-anchor: start; font-size: 11px;">Check DNS routing via Cloudflare</text>
  <text x="65" y="790" class="text-small" style="text-anchor: start; font-size: 11px;">Check Scalable and highly available</text>
</svg>